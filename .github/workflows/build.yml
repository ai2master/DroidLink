# DroidLink 跨平台构建工作流 / Cross-platform build workflow
# 构建 Windows、macOS、Linux 三个平台的桌面应用
name: Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/build.yml'
  workflow_dispatch:

permissions:
  contents: read

# 同一仓库并发不超过 1 个构建，取消之前的运行
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: 'stable'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-2022
            target: windows
          - platform: macos-14
            target: macos

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # 设置 Java (构建 Android companion app 需要)
      # Setup Java (needed for Android companion app build)
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 设置 Gradle (直接用 Gradle 8.5，不依赖 wrapper JAR)
      # Setup Gradle (use Gradle 8.5 directly, no wrapper JAR dependency)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      # Linux 依赖 / Linux dependencies
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            rpm

      # =====================================================================
      # 统一版本号生成 / Unified Version Number Generation
      # =====================================================================
      #
      # 【三层版本方案 / Three-Layer Version Scheme】
      #
      # 此步骤为 Desktop 和 Companion 生成统一的版本号。
      # This step generates unified version numbers for Desktop and Companion.
      #
      # 输入 / Inputs:
      #   - tauri.conf.json 中的 version 字段 → 基础语义版本 (手动维护)
      #     version field in tauri.conf.json → base semantic version (manually maintained)
      #   - git rev-list --count HEAD → 构建号 (每次提交自动递增)
      #     git rev-list --count HEAD → build number (auto-increments per commit)
      #   - git rev-parse --short=7 HEAD → 短 SHA (用于追溯源码)
      #     git rev-parse --short=7 HEAD → short SHA (for source tracing)
      #
      # 输出 / Outputs:
      #   - VERSION = "2.0.42"       ── semver 版本号 (写入 tauri.conf.json 和 Cargo.toml)
      #                                  semver version (written to tauri.conf.json and Cargo.toml)
      #                                  格式: MAJOR.MINOR.BUILD (Tauri 要求严格 3 段 semver)
      #                                  Format: MAJOR.MINOR.BUILD (Tauri requires strict 3-segment semver)
      #   - BASE_VERSION = "2.0.0"   ── 基础版本 (写入 version.txt 的 version 字段)
      #                                  Base version (written to version.txt version field)
      #   - BUILD_NUMBER = "42"      ── 构建号 (传给 gradle 作为 versionCode)
      #                                  Build number (passed to gradle as versionCode)
      #   - SHORT_SHA = "9d8f3a1"    ── 短 SHA (写入 version.txt 供追溯)
      #                                  Short SHA (written to version.txt for tracing)
      #
      # 版本号如何跨组件流动 / How version flows across components:
      #   tauri.conf.json (手动维护 "2.0.0")
      #     ↓ CI 读取 MAJOR=2, MINOR=0
      #     ↓ CI reads MAJOR=2, MINOR=0
      #   VERSION = "2.0.42" (MAJOR.MINOR.BUILD) → 写回 tauri.conf.json + Cargo.toml
      #                                             Written back to tauri.conf.json + Cargo.toml
      #   BUILD_NUMBER = "42" → 传给 gradle -PciVersionCode=42
      #                         Passed to gradle -PciVersionCode=42
      #   VERSION = "2.0.42" → 传给 gradle -PciVersionName="2.0.42"
      #                         Passed to gradle -PciVersionName="2.0.42"
      #   → 写入 version.txt JSON (Desktop 内置元数据)
      #     Written to version.txt JSON (Desktop bundled metadata)
      #
      # 开发者只需维护 tauri.conf.json 中的基础版本号 (如 "2.0.0")，
      # CI 提取 MAJOR.MINOR 并用 commit count 作为 PATCH，确保 semver 合规且唯一。
      # Developer only maintains base version in tauri.conf.json (e.g. "2.0.0"),
      # CI extracts MAJOR.MINOR and uses commit count as PATCH, ensuring semver-compliant unique builds.
      # =====================================================================
      - name: Set version number
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          # 从 tauri.conf.json 读取基础语义版本 (手动维护，如 "2.0.0")
          # Read base semantic version from tauri.conf.json (manually maintained, e.g. "2.0.0")
          BASE_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('src-tauri/tauri.conf.json','utf8')).version)")
          # 提取 MAJOR.MINOR，用 commit count 作为 PATCH → 严格 3 段 semver
          # Extract MAJOR.MINOR, use commit count as PATCH → strict 3-segment semver
          # Tauri v2 要求 version 必须是严格的 semver (X.Y.Z)，不支持 4 段
          # Tauri v2 requires version to be strict semver (X.Y.Z), 4-segment is not supported
          MAJOR=$(echo "$BASE_VERSION" | cut -d. -f1)
          MINOR=$(echo "$BASE_VERSION" | cut -d. -f2)
          VERSION="${MAJOR}.${MINOR}.${COMMIT_COUNT}"
          echo "Setting version to ${VERSION} (base=${BASE_VERSION}, build=${COMMIT_COUNT}, sha=${SHORT_SHA})"
          # 使用 node 更新 tauri.conf.json 和 Cargo.toml (跨平台兼容，macOS/Linux/Windows)
          # Use node to update tauri.conf.json and Cargo.toml (cross-platform: macOS/Linux/Windows)
          # 注意：不能用 sed -i，因为 macOS BSD sed 语法不同
          # Note: cannot use sed -i, macOS BSD sed has different syntax
          node -e "
            const fs = require('fs');
            // 更新 tauri.conf.json / Update tauri.conf.json
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
            // 更新 Cargo.toml / Update Cargo.toml
            let cargo = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
            cargo = cargo.replace(/^version = \".*\"/m, 'version = \"${VERSION}\"');
            fs.writeFileSync('src-tauri/Cargo.toml', cargo);
          "
          # 将版本变量导出到后续步骤 / Export version variables to subsequent steps
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          echo "BASE_VERSION=${BASE_VERSION}" >> $GITHUB_ENV
          echo "BUILD_NUMBER=${COMMIT_COUNT}" >> $GITHUB_ENV
          echo "SHORT_SHA=${SHORT_SHA}" >> $GITHUB_ENV
          echo "=== tauri.conf.json ==="
          cat src-tauri/tauri.conf.json | head -6
          echo "=== Cargo.toml ==="
          head -3 src-tauri/Cargo.toml

      - name: Install npm dependencies
        run: npm ci || npm install

      # =====================================================================
      # 构建 Android Companion APK + 生成版本元数据
      # Build Android Companion APK + Generate Version Metadata
      # =====================================================================
      #
      # 此步骤完成两件事 / This step does two things:
      #
      # 1. 构建 Companion APK 并注入版本号
      #    Build Companion APK with injected version numbers
      #    - gradle 属性 -PciVersionCode → Android versionCode (整数，递增)
      #      gradle property -PciVersionCode → Android versionCode (integer, incrementing)
      #    - gradle 属性 -PciVersionName → Android versionName (用户可见字符串)
      #      gradle property -PciVersionName → Android versionName (user-facing string)
      #    - build.gradle.kts 中通过 project.findProperty() 接收这些值
      #      build.gradle.kts receives these via project.findProperty()
      #
      # 2. 生成 version.txt JSON 元数据文件
      #    Generate version.txt JSON metadata file
      #    - Desktop 启动时读取此文件判断 Companion 版本
      #      Desktop reads this file at startup to check Companion version
      #    - 包含版本号、构建号、协议版本、git SHA
      #      Contains version, build, protocol version, git SHA
      #
      # version.txt JSON 格式 / version.txt JSON format:
      #   {
      #     "version": "2.0.0",        ── 基础语义版本 / base semantic version
      #     "build": 42,               ── CI 构建号 = git commit count
      #     "versionCode": 42,         ── Android versionCode (与 build 相同)
      #     "protocolVersion": 1,      ── 协议版本号 (见下方重要说明)
      #                                   Protocol version (see important note below)
      #     "sha": "9d8f3a1"           ── git commit 短 SHA
      #   }
      #
      # 重要：protocolVersion 必须与以下两处保持一致！
      # IMPORTANT: protocolVersion must match these two locations!
      #   - src-tauri/src/commands/mod.rs → pub const PROTOCOL_VERSION
      #   - android/.../CompanionVersion.kt → PROTOCOL_VERSION
      # =====================================================================
      - name: Build companion APK
        shell: bash
        run: |
          cd android
          # 构建 release APK，通过 gradle 属性注入版本号
          # Build release APK, inject version via gradle properties
          gradle assembleRelease --no-daemon --stacktrace \
            -PciVersionCode=${{ env.BUILD_NUMBER }} \
            -PciVersionName=${{ env.VERSION }}
          # 复制 APK 到 Desktop 的资源目录 (Tauri 会将此目录打包进安装包)
          # Copy APK to Desktop's resource directory (Tauri bundles this into the installer)
          mkdir -p ../src-tauri/resources/companion
          cp app/build/outputs/apk/release/app-release.apk ../src-tauri/resources/companion/DroidLinkCompanion.apk
          # 生成 JSON 格式的 version.txt (Desktop 运行时读取此文件判断版本)
          # Generate JSON version.txt (Desktop reads this file at runtime for version check)
          node -e "
            const fs = require('fs');
            const info = {
              version: '${{ env.BASE_VERSION }}',
              build: parseInt('${{ env.BUILD_NUMBER }}', 10),
              versionCode: parseInt('${{ env.BUILD_NUMBER }}', 10),
              protocolVersion: 1, // Must match PROTOCOL_VERSION in commands/mod.rs and CompanionVersion.kt
              sha: '${{ env.SHORT_SHA }}'
            };
            fs.writeFileSync('../src-tauri/resources/companion/version.txt', JSON.stringify(info, null, 2) + '\n');
          "
          echo "=== version.txt ==="
          cat ../src-tauri/resources/companion/version.txt
          ls -lah ../src-tauri/resources/companion/

      # 下载 Google 官方 platform-tools (内含 ADB)
      # Download official Google platform-tools (contains ADB)
      # Note: Google uses "-latest" URLs that always point to the newest version,
      # so pinned checksums would break on updates. We verify the binary works instead.
      - name: Download platform-tools
        shell: bash
        run: |
          mkdir -p src-tauri/resources/adb
          if [ "${{ matrix.target }}" == "windows" ]; then
            curl -L --fail -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb.exe src-tauri/resources/adb/
            cp platform-tools/AdbWinApi.dll src-tauri/resources/adb/
            cp platform-tools/AdbWinUsbApi.dll src-tauri/resources/adb/
          elif [ "${{ matrix.target }}" == "macos" ]; then
            curl -L --fail -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-darwin.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb src-tauri/resources/adb/
            chmod +x src-tauri/resources/adb/adb
          elif [ "${{ matrix.target }}" == "linux" ]; then
            curl -L --fail -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-linux.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb src-tauri/resources/adb/
            chmod +x src-tauri/resources/adb/adb
          fi
          # Verify ADB binary is valid (not corrupt/truncated)
          src-tauri/resources/adb/adb$([ "${{ matrix.target }}" == "windows" ] && echo ".exe") version || (echo "ERROR: ADB binary verification failed" && exit 1)
          ls -lah src-tauri/resources/adb/

      - name: Build scrcpy from source
        shell: bash
        run: |
          SCRCPY_VERSION="3.1"
          mkdir -p src-tauri/resources/scrcpy

          # Clone scrcpy source (pinned to specific release tag)
          git clone --depth 1 --branch "v${SCRCPY_VERSION}" https://github.com/Genymobile/scrcpy.git /tmp/scrcpy-src
          echo "scrcpy source cloned at tag v${SCRCPY_VERSION}, commit: $(cd /tmp/scrcpy-src && git rev-parse HEAD)"

          if [ "${{ matrix.target }}" == "linux" ]; then
            sudo apt-get install -y \
              ffmpeg libsdl2-dev libavcodec-dev libavdevice-dev \
              libavformat-dev libavutil-dev libswresample-dev \
              libusb-1.0-0-dev meson ninja-build pkg-config
            cd /tmp/scrcpy-src
            meson setup build --buildtype=release -Dcompile_server=false
            ninja -C build
            cp build/app/scrcpy $GITHUB_WORKSPACE/src-tauri/resources/scrcpy/scrcpy
            chmod +x $GITHUB_WORKSPACE/src-tauri/resources/scrcpy/scrcpy

          elif [ "${{ matrix.target }}" == "macos" ]; then
            brew install ffmpeg sdl2 meson pkg-config libusb
            cd /tmp/scrcpy-src
            meson setup build --buildtype=release -Dcompile_server=false
            ninja -C build
            cp build/app/scrcpy $GITHUB_WORKSPACE/src-tauri/resources/scrcpy/scrcpy
            chmod +x $GITHUB_WORKSPACE/src-tauri/resources/scrcpy/scrcpy

          elif [ "${{ matrix.target }}" == "windows" ]; then
            # On Windows, download pre-built scrcpy release (building from source on Windows CI is very complex)
            curl -L --fail -o /tmp/scrcpy-win.zip "https://github.com/Genymobile/scrcpy/releases/download/v${SCRCPY_VERSION}/scrcpy-win64-v${SCRCPY_VERSION}.zip"
            unzip -q /tmp/scrcpy-win.zip -d /tmp/scrcpy-win
            cp /tmp/scrcpy-win/scrcpy-win64-v${SCRCPY_VERSION}/scrcpy.exe src-tauri/resources/scrcpy/
            cp /tmp/scrcpy-win/scrcpy-win64-v${SCRCPY_VERSION}/scrcpy-server src-tauri/resources/scrcpy/
            # Copy required DLLs
            for dll in /tmp/scrcpy-win/scrcpy-win64-v${SCRCPY_VERSION}/*.dll; do
              cp "$dll" src-tauri/resources/scrcpy/ 2>/dev/null || true
            done
          fi

          ls -lah $GITHUB_WORKSPACE/src-tauri/resources/scrcpy/

      - name: Download scrcpy-server
        if: matrix.target != 'windows'
        shell: bash
        run: |
          SCRCPY_VERSION="3.1"
          curl -L --fail -o src-tauri/resources/scrcpy/scrcpy-server \
            "https://github.com/Genymobile/scrcpy/releases/download/v${SCRCPY_VERSION}/scrcpy-server-v${SCRCPY_VERSION}"
          ls -lah src-tauri/resources/scrcpy/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      # 生成构建产物的 SHA256 校验和 / Generate SHA256 checksums for build artifacts
      - name: Generate checksums
        shell: bash
        run: |
          cd src-tauri/target/release/bundle
          echo "=== Build artifact checksums ==="
          find . -type f \( -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.msi" -o -name "*.exe" -o -name "*.dmg" \) -exec sha256sum {} \; | tee checksums-${{ matrix.target }}.txt
          cp checksums-${{ matrix.target }}.txt $GITHUB_WORKSPACE/checksums-${{ matrix.target }}.txt

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums-${{ matrix.target }}
          path: checksums-${{ matrix.target }}.txt
          if-no-files-found: warn

      # 上传构建产物 / Upload build artifacts
      # 分开上传 Linux 产物，避免 AppImage 撑大总体积
      # Upload Linux artifacts separately to show individual sizes
      - name: Upload Linux DEB
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Linux RPM
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
