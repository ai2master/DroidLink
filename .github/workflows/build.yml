# DroidLink 跨平台构建工作流 / Cross-platform build workflow
# 构建 Windows、macOS、Linux 三个平台的桌面应用
name: Build

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'src-tauri/**'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - '.github/workflows/build.yml'
  workflow_dispatch:

# 同一仓库并发不超过 1 个构建，取消之前的运行
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '20'
  RUST_TOOLCHAIN: 'stable'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: linux
          - platform: windows-latest
            target: windows
          - platform: macos-latest
            target: macos

    runs-on: ${{ matrix.platform }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux 依赖 / Linux dependencies
      - name: Install Linux dependencies
        if: matrix.target == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            rpm

      # 自动生成版本号: 1.0.{commit_count} (每次提交递增)
      # Auto-generate version: 1.0.{commit_count} (increments per commit)
      - name: Set version number
        shell: bash
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          VERSION="1.0.${COMMIT_COUNT}"
          echo "Setting version to ${VERSION}"
          # 更新 tauri.conf.json 中的版本号 / Update version in tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          cat src-tauri/tauri.conf.json | head -6

      - name: Install npm dependencies
        run: npm ci || npm install

      # 创建 Companion APK 占位符（CI 不构建 Android）
      # Create companion APK placeholder (CI doesn't build Android)
      - name: Create companion APK placeholder
        shell: bash
        run: |
          mkdir -p src-tauri/resources/companion
          if [ ! -f src-tauri/resources/companion/DroidLinkCompanion.apk ]; then
            echo "placeholder" > src-tauri/resources/companion/DroidLinkCompanion.apk
          fi
          if [ ! -f src-tauri/resources/companion/version.txt ]; then
            echo "1.0" > src-tauri/resources/companion/version.txt
          fi

      # 下载 Google 官方 platform-tools (内含 ADB)
      # Download official Google platform-tools (contains ADB)
      - name: Download platform-tools
        shell: bash
        run: |
          mkdir -p src-tauri/resources/adb
          if [ "${{ matrix.target }}" == "windows" ]; then
            curl -L -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-windows.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb.exe src-tauri/resources/adb/
            cp platform-tools/AdbWinApi.dll src-tauri/resources/adb/
            cp platform-tools/AdbWinUsbApi.dll src-tauri/resources/adb/
          elif [ "${{ matrix.target }}" == "macos" ]; then
            curl -L -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-darwin.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb src-tauri/resources/adb/
            chmod +x src-tauri/resources/adb/adb
          elif [ "${{ matrix.target }}" == "linux" ]; then
            curl -L -o platform-tools.zip "https://dl.google.com/android/repository/platform-tools-latest-linux.zip"
            unzip -q platform-tools.zip
            cp platform-tools/adb src-tauri/resources/adb/
            chmod +x src-tauri/resources/adb/adb
          fi
          ls -lah src-tauri/resources/adb/

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri

      # 上传构建产物 / Upload build artifacts
      # 分开上传 Linux 产物，避免 AppImage 撑大总体积
      # Upload Linux artifacts separately to show individual sizes
      - name: Upload Linux DEB
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: warn

      - name: Upload Linux RPM
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: warn

      - name: Upload Linux AppImage
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: warn

      - name: Upload Windows artifacts
        if: matrix.target == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-windows
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload macOS artifacts
        if: matrix.target == 'macos'
        uses: actions/upload-artifact@v4
        with:
          name: DroidLink-macos
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          if-no-files-found: warn
